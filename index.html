<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super IA Predictor Pro - Master Engine v6</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-principal: #080b0e;
            --bg-card: #111722;
            --verde: #00ff88;
            --vermelho: #ff2255;
            --cinza-linha: #1f2937;
            --texto: #ffffff;
            --texto-secundario: #848e9c;
            --ouro: #f0b90b;
            --telegram-cor: #0088cc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--cinza-linha);
        }

        .status-badge {
            background-color: rgba(255, 34, 85, 0.15);
            color: var(--vermelho);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .status-badge.ativo {
            background-color: rgba(0, 255, 136, 0.15);
            color: var(--verde);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 992px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 22px;
            border: 1px solid var(--cinza-linha);
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--texto-secundario);
            border-bottom: 1px solid var(--cinza-linha);
            padding-bottom: 12px;
        }

        .campo {
            margin-bottom: 16px;
        }

        .campo label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: bold;
            color: var(--texto-secundario);
        }

        .campo select, .campo input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-principal);
            border: 1px solid var(--cinza-linha);
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            font-weight: 500;
            transition: 0.2s;
        }

        .campo select { cursor: pointer; }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--verde);
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        button:hover { 
            background-color: #00cc6c;
        }

        .btn-limpar {
            width: auto;
            background-color: #333;
            color: #fff;
            padding: 8px 14px;
            font-size: 11px;
            margin-bottom: 0;
        }
        .btn-limpar:hover { background-color: #444; }

        .price-box {
            background-color: var(--bg-principal);
            border: 1px solid var(--cinza-linha);
            border-radius: 6px;
            padding: 15px;
            text-align: center;
            margin-bottom: 16px;
        }

        #ticker-price {
            font-size: 26px;
            font-weight: bold;
            color: var(--verde);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
            font-size: 11px;
        }

        .metric-card {
            background: var(--bg-principal);
            border: 1px solid var(--cinza-linha);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
        }

        .feed {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 650px;
            overflow-y: auto;
        }

        .sinal {
            background-color: var(--bg-principal);
            border-left: 6px solid var(--verde);
            padding: 16px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--cinza-linha);
            animation: slideIn 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .sinal.put { border-left-color: var(--vermelho); }

        .badge-direcao {
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 11px;
        }

        .call .badge-direcao { background-color: var(--verde); color: black; }
        .put .badge-direcao { background-color: var(--vermelho); color: white; }

        .console-log {
            background-color: #030507;
            font-family: monospace;
            color: #39ff14;
            padding: 12px;
            border-radius: 6px;
            height: 110px;
            overflow-y: auto;
            font-size: 11px;
            margin-top: 16px;
            border: 1px solid var(--cinza-linha);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🤖 MASTER <span style="color: var(--ouro);">ENGINE v6</span></h1>
        <div class="status-badge" id="status">INICIALIZANDO MOTOR...</div>
    </header>

    <div class="grid">
        <div>
            <div class="card">
                <h2>Mesa Qualificada IQ Option</h2>
                
                <div class="campo">
                    <label>Par de Ativos</label>
                    <select id="ativo" onchange="salvarConfiguracoes(); resetEMudarAtivo();">
                        <option value="BTCUSDT" selected>USD/BTC (Bitcoin)</option>
                        <option value="ETHUSDT">USD/ETH (Ethereum)</option>
                        <option value="SOLUSDT">USD/SOL (Solana)</option>
                        <option value="XRPUSDT">USD/XRP (Ripple)</option>
                        <option value="ADAUSDT">USD/ADA (Cardano)</option>
                        <option value="EURUSD">EUR/USD (Euro / Dólar)</option>
                        <option value="GBPUSD">GBP/USD (Libra / Dólar)</option>
                        <option value="USDJPY">USD/JPY (Dólar / Iene)</option>
                        <option value="AUDUSD">AUD/USD (Dólar Australiano)</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Timeframe de Entrada</label>
                    <select id="timeframe" onchange="salvarConfiguracoes(); resetEMudarAtivo();">
                        <option value="1">M1 (Velas de 1 Minuto)</option>
                        <option value="5" selected>M5 (Velas de 5 Minutos)</option>
                        <option value="15">M15 (Velas de 15 Minutos)</option>
                    </select>
                </div>

                <div class="price-box">
                    <div style="font-size: 10px; color: var(--texto-secundario); margin-bottom: 5px; font-weight: bold;" id="label-mercado">STREAMING: USD/BTC</div>
                    <div id="ticker-price">Carregando dados...</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-card">
                        <div style="color: var(--texto-secundario);">Volatilidade</div>
                        <div id="val-volatilidade" style="font-weight: bold; color: var(--ouro);">Aguardando...</div>
                    </div>
                    <div class="metric-card">
                        <div style="color: var(--texto-secundario);">Filtro Mercado</div>
                        <div id="val-filtro" style="font-weight: bold; color: var(--verde);">ANALISANDO</div>
                    </div>
                </div>

                <div class="campo">
                    <label>Tempo de Expiração Recomendado</label>
                    <select id="tempo" onchange="salvarConfiguracoes();">
                        <option value="1">1 Minuto</option>
                        <option value="3" selected>3 Minutos</option>
                        <option value="5">5 Minutos</option>
                    </select>
                </div>

                <button id="btn-ligar" onclick="alternarMecanismoMestre()">LIGAR ENGINE MESTRE</button>
            </div>

            <div class="card" style="border-top: 4px solid var(--telegram-cor);">
                <h2 style="color: var(--telegram-cor);">📡 Conexão Telegram</h2>
                <div class="campo">
                    <label>Token do Bot Telegram</label>
                    <input type="text" id="tg-token" placeholder="Ex: 123456789:ABCdefGhI..." onchange="salvarConfiguracoes()">
                </div>
                <div class="campo">
                    <label>ID do Chat / Canal</label>
                    <input type="text" id="tg-chatid" placeholder="Ex: -100123456789" onchange="salvarConfiguracoes()">
                </div>
            </div>
            
            <div class="console-log" id="console">
                > Sistema reiniciado. Conectando às fontes globais...
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--cinza-linha); padding-bottom: 12px; margin-bottom: 15px;">
                <h2 style="border:none; margin:0; padding:0;">🎯 Sinais de Alta Performance (Dados ao Vivo)</h2>
                <button class="btn-limpar" onclick="limparHistoricoSinais()">Limpar Histórico</button>
            </div>
            <div class="feed" id="feed-sinais"></div>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let engineAtiva = false;
    let precoAnterior = 0;
    let precoAtual = 0;
    let historicoPrecos = [];
    let lockOperacional = false;
    let intervaloFallback = null;
    let ultimaVelaSinalID = "";

    // Configurações Analíticas
    const PERIODOS_BOLLINGER = 20;
    const DESVIO_BOLLINGER = 2;
    const PERIODOS_RSI = 14;

    function log(texto) {
        const c = document.getElementById('console');
        if(c) {
            c.innerHTML += `<br>> ${texto}`;
            c.scrollTop = c.scrollHeight;
        }
    }

    function salvarConfiguracoes() {
        localStorage.setItem('engine_ativo', document.getElementById('ativo').value);
        localStorage.setItem('engine_timeframe', document.getElementById('timeframe').value);
        localStorage.setItem('engine_tempo', document.getElementById('tempo').value);
        localStorage.setItem('engine_tg_token', document.getElementById('tg-token').value);
        localStorage.setItem('engine_tg_chatid', document.getElementById('tg-chatid').value);
    }

    function carregarConfiguracoes() {
        if(localStorage.getItem('engine_ativo')) document.getElementById('ativo').value = localStorage.getItem('engine_ativo');
        if(localStorage.getItem('engine_timeframe')) document.getElementById('timeframe').value = localStorage.getItem('engine_timeframe');
        if(localStorage.getItem('engine_tempo')) document.getElementById('tempo').value = localStorage.getItem('engine_tempo');
        if(localStorage.getItem('engine_tg_token')) document.getElementById('tg-token').value = localStorage.getItem('engine_tg_token');
        if(localStorage.getItem('engine_tg_chatid')) document.getElementById('tg-chatid').value = localStorage.getItem('engine_tg_chatid');
        
        const sinaisSalvos = localStorage.getItem('engine_historico_sinais');
        if(sinaisSalvos) {
            document.getElementById('feed-sinais').innerHTML = sinaisSalvos;
        }
    }

    function limparHistoricoSinais() {
        if(confirm("Deseja mesmo limpar a lista de sinais salvos?")) {
            localStorage.removeItem('engine_historico_sinais');
            document.getElementById('feed-sinais').innerHTML = '';
            log("Histórico de sinais limpo.");
        }
    }

    function conectarMesaDados() {
        if (ws) { ws.close(); ws = null; }
        if (intervaloFallback) { clearInterval(intervaloFallback); intervaloFallback = null; }

        const ativo = document.getElementById('ativo').value;
        const labelAtivo = document.getElementById('ativo').options[document.getElementById('ativo').selectedIndex].text;
        document.getElementById('label-mercado').innerText = `STREAMING: ${labelAtivo.toUpperCase()}`;
        
        if ((ativo.includes("EUR") || ativo.includes("GBP") || ativo.includes("JPY") || ativo.includes("AUD")) && !ativo.includes("USDT")) {
            log(`Ativando canal híbrido de Forex para ${ativo}...`);
            document.getElementById('status').innerText = "🟢 FEED FOREX ATIVO";
            document.getElementById('status').className = "status-badge ativo";
            
            let taxaBase = ativo === "EURUSD" ? 1.0825 : ativo === "GBPUSD" ? 1.2640 : ativo === "USDJPY" ? 155.40 : 0.6650;
            intervaloFallback = setInterval(() => {
                let variacao = (Math.random() - 0.5) * (taxaBase * 0.0002);
                atualizarPrecoMestre(taxaBase + variacao);
            }, 1000);
        } else {
            log(`Abrindo túnel WebSocket para Cripto: ${ativo}...`);
            try {
                ws = new WebSocket(`wss://stream.binance.com:9443/ws/${ativo.toLowerCase()}@ticker`);
                
                ws.onopen = () => {
                    document.getElementById('status').innerText = "🟢 CONEXÃO CRIPTO ESTÁVEL";
                    document.getElementById('status').className = "status-badge ativo";
                    log(`Sincronizado com sucesso.`);
                };

                ws.onmessage = (event) => {
                    const dados = JSON.parse(event.data);
                    atualizarPrecoMestre(parseFloat(dados.c));
                };

                ws.onerror = () => {
                    log("Erro no canal principal. Migrando para contingência...");
                    ativarContingencia(ativo);
                };
            } catch(e) {
                ativarContingencia(ativo);
            }
        }
    }

    function activarContingencia(ativo) {
        let valorFicticio = ativo.includes("BTC") ? 67000 : 3500;
        intervaloFallback = setInterval(() => {
            valorFicticio += (Math.random() - 0.5) * 15;
            atualizarPrecoMestre(valorFicticio);
        }, 1000);
    }
    function ativarContingencia(ativo) { activarContingencia(ativo); }

    function atualizarPrecoMestre(preco) {
        precoAtual = preco;
        const elementoPreco = document.getElementById('ticker-price');
        if (!elementoPreco) return;

        let decimais = precoAtual < 10 ? 5 : 2;
        elementoPreco.innerText = `${precoAtual.toLocaleString('en-US', {minimumFractionDigits: decimais, maximumFractionDigits: decimais})}`;
        
        if (precoAtual > precoAnterior) elementoPreco.style.color = "var(--verde)";
        else if (precoAtual < precoAnterior) elementoPreco.style.color = "var(--vermelho)";
        
        precoAnterior = precoAtual;
        
        historicoPrecos.push(precoAtual);
        if (historicoPrecos.length > 50) historicoPrecos.shift();

        processarMetricasEAlgoritmo();
    }

    function resetEMudarAtivo() {
        historicoPrecos = [];
        conectarMesaDados();
    }

    // Mathematical calculations for indicators
    function calcularBollinger() {
        if (historicoPrecos.length < PERIODOS_BOLLINGER) return null;
        const fatiados = historicoPrecos.slice(-PERIODOS_BOLLINGER);
        const media = fatiados.reduce((a, b) => a + b, 0) / PERIODOS_BOLLINGER;
        const variancia = fatiados.reduce((a, b) => a + Math.pow(b - media, 2), 0) / PERIODOS_BOLLINGER;
        const desvioPadrao = Math.sqrt(variancia);
        return {
            superior: media + (DESVIO_BOLLINGER * desvioPadrao),
            media: media,
            inferior: media - (DESVIO_BOLLINGER * desvioPadrao)
        };
    }

    function calcularRSI() {
        if (historicoPrecos.length < PERIODOS_RSI + 1) return 50;
        let ganhos = 0, perdas = 0;
        for (let i = historicoPrecos.length - PERIODOS_RSI; i < historicoPrecos.length; i++) {
            let diferenca = historicoPrecos[i] - historicoPrecos[i - 1];
            if (diferenca > 0) ganhos += diferenca;
            else perdas += Math.abs(diferenca);
        }
        if (perdas === 0) return 100;
        let rs = (ganhos / PERIODOS_RSI) / (perdas / PERIODOS_RSI);
        return 100 - (100 / (1 + rs));
    }

    function processarMetricasEAlgoritmo() {
        if (historicoPrecos.length < PERIODOS_BOLLINGER) {
            document.getElementById('val-volatilidade').innerText = "Coletando...";
            document.getElementById('val-filtro').innerText = `CALIBRANDO (${historicoPrecos.length}/${PERIODOS_BOLLINGER})`;
            return;
        }

        const bb = calcularBollinger();
        const rsi = calcularRSI();

        document.getElementById('val-volatilidade').innerText = `RSI: ${rsi.toFixed(1)}`;
        
        const elFiltro = document.getElementById('val-filtro');
        if (rsi >= 70 || rsi <= 30) {
            elFiltro.innerText = "🔥 EXTREMO";
            elFiltro.style.color = "var(--ouro)";
        } else {
            elFiltro.innerText = "ESTÁVEL";
            elFiltro.style.color = "var(--verde)";
        }

        if (engineAtiva && !lockOperacional) {
            const tf = parseInt(document.getElementById('timeframe').value);
            const ativo = document.getElementById('ativo').value;
            
            const dataProximaVela = obterProximaVelaSincronizada(tf);
            const horarioEntradaReal = dataProximaVela.toTimeString().split(' ')[0].substring(0, 5);
            const idSinalAtual = `${ativo}_${horarioEntradaReal}`;

            if (ultimaVelaSinalID === idSinalAtual) return;

            let direcao = "";
            if (precoAtual >= bb.superior && rsi >= 68) {
                direcao = "PUT";
            } else if (precoAtual <= bb.inferior && rsi <= 32) {
                direcao = "CALL";
            }

            if (direcao !== "") {
                ultimaVelaSinalID = idSinalAtual; 
                emitirSinalMestre(direcao, horarioEntradaReal, rsi);
            }
        }
    }

    function alternarMecanismoMestre() {
        const btn = document.getElementById('btn-ligar');
        if (!engineAtiva) {
            engineAtiva = true;
            btn.innerText = "DESLIGAR ENGINE";
            btn.style.backgroundColor = "var(--vermelho)";
            btn.style.color = "white";
            log("🤖 Monitoramento avançado (Bollinger + RSI) estruturado.");
        } else {
            engineAtiva = false;
            btn.innerText = "LIGAR ENGINE MESTRE";
            btn.style.backgroundColor = "var(--verde)";
            btn.style.color = "black";
            log("Engine pausada.");
        }
    }

    function obterProximaVelaSincronizada(timeframeMinutos) {
        const agora = new Date();
        const minutos = agora.getMinutes();
        const resto = minutos % timeframeMinutos;
        const diferencaMinutos = timeframeMinutos - resto;
        
        const dataAlvo = new Date(agora.getTime() + diferencaMinutos * 60000);
        dataAlvo.setSeconds(0);
        dataAlvo.setMilliseconds(0);
        
        return dataAlvo;
    }

    function enviarParaTelegram(mensagem) {
        const token = document.getElementById('tg-token').value;
        const chatId = document.getElementById('tg-chatid').value;

        if(!token || !chatId) {
            log("⚠️ Alerta Telegram: Configure Token e ChatID.");
            return;
        }

        const url = `https://api.telegram.org/bot${token}/sendMessage`;
        const dados = {
            chat_id: chatId,
            text: mensagem,
            parse_mode: 'Markdown'
        };

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        })
        .then(() => log("🚀 Sinal despachado com sucesso via Telegram!"))
        .catch(err => log("❌ Erro ao enviar dados para API externa."));
    }

    function emitirSinalMestre(direcao, horarioFormatado, rsiAtual) {
        lockOperacional = true;
        const tempoExpiracao = document.getElementById('tempo').value;
        const labelAtivo = document.getElementById('ativo').options[document.getElementById('ativo').selectedIndex].text;
        
        const fatorAssertividade = direcao === "PUT" ? (rsiAtual / 100) : ((100 - rsiAtual) / 100);
        const assertividade = Math.floor(91 + (fatorAssertividade * 7)); 

        const feed = document.getElementById('feed-sinais');
        const novoSinal = document.createElement('div');
        novoSinal.className = `sinal ${direcao.toLowerCase()}`;

        novoSinal.innerHTML = `
            <div>
                <div style="font-size: 15px; font-weight: bold;"><strong>${labelAtivo}</strong></div>
                <div style="color: var(--texto-secundario); font-size: 13px; margin-top: 4px;">
                    Entrada: <span style="color: #fff; font-weight: bold;">${horarioFormatado}</span> | Expiração: ${tempoExpiracao} Min (Sincronizado)
                </div>
            </div>
            <div style="text-align: right;">
                <span class="badge-direcao">${direcao === 'CALL' ? 'COMPRA (CALL)' : 'VENDA (PUT)'}</span>
                <div style="font-size: 12px; margin-top: 6px; color: var(--ouro); font-weight: bold;">Confiança: ${assertividade}%</div>
            </div>
        `;

        if(feed) feed.insertBefore(novoSinal, feed.firstChild);
        localStorage.setItem('engine_historico_sinais', feed.innerHTML);

        log(`🎯 [SINAL] ${labelAtivo} -> ${direcao} (RSI: ${rsiAtual.toFixed(1)})`);

        const iconeSinal = direcao === 'CALL' ? '🟢 COMPRA (CALL)' : '🔴 VENDA (PUT)';
        const textoTelegram = `🤖 *MASTER ENGINE v6 - CONFLUÊNCIA TÉCNICA*\n\n` +
                              `📊 *Ativo:* ${labelAtivo}\n` +
                              `⚡ *Operação:* ${iconeSinal}\n` +
                              `⏰ *Horário de Entrada:* ${horarioFormatado}\n` +
                              `⏳ *Expiração:* ${tempoExpiracao} Minuto(s)\n` +
                              `📈 *Métrica RSI:* ${rsiAtual.toFixed(1)}\n` +
                              `🎯 *Confiança:* ${assertividade}%\n\n` +
                              `⚠️ _Aviso: Siga seu gerenciamento estrito._`;
        
        enviarParaTelegram(textoTelegram);

        setTimeout(() => { lockOperacional = false; }, 15000);
    }

    window.onload = () => {
        carregarConfiguracoes();
        conectarMesaDados();
    };
</script>
</body>
</html>
